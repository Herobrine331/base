<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Wallet</title>
    <style>
        :root {
            --bg: #000000;
            --cb-blue: #0052ff;
            --dark-gray: #1e1e20;
            --text-dim: #8e8e93;
            --success: #2ecc71;
            --border-line: #1a1a1a;
        }

        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }

        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
            position: relative;
        }

        /* Header Area - Shifted to Top */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 15px 0;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .base-logo {
            width: 34px;
            height: 34px;
            background: var(--cb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .base-logo::after {
            content: "";
            width: 17px;
            height: 17px;
            border: 3.5px solid white;
            border-radius: 50%;
        }

        .user-id { font-weight: 600; font-size: 16px; }
        .chevron { color: var(--text-dim); font-size: 13px; margin-left: -2px; }

        .nav-actions { display: flex; gap: 20px; font-size: 22px; }

        /* Balance Display */
        .balance-display {
            font-size: 44px;
            font-weight: 700;
            margin: 10px 0 25px 0;
            letter-spacing: -1.2px;
        }

        /* Buttons (Buy, Swap, Cash out) */
        .btn-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 30px; 
        }

        .btn {
            background: var(--dark-gray);
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-blue { 
            background: linear-gradient(135deg, #004dff, #0052ff); 
        }

        /* Tabs (Crypto, NFTs, DeFi) */
        .tabs {
            display: flex;
            gap: 28px;
            border-bottom: 0.5px solid var(--border-line);
            margin-bottom: 20px;
        }

        .tab { 
            padding-bottom: 14px; 
            color: var(--text-dim); 
            font-weight: 600; 
            font-size: 16px;
        }

        .tab.active { 
            color: var(--cb-blue); 
            border-bottom: 2.5px solid var(--cb-blue); 
        }

        /* Network Selector */
        .network-pill {
            background: var(--dark-gray);
            width: fit-content;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Bitcoin Asset Row */
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .asset-left { display: flex; align-items: center; gap: 14px; }
        
        .btc-icon {
            width: 44px;
            height: 44px;
            background: #f7931a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: white;
        }

        .asset-name { font-weight: 600; font-size: 18px; }
        .asset-change { color: var(--success); font-size: 14px; margin-top: 2px; }

        .asset-right { text-align: right; }
        .asset-val-usd { font-weight: 600; font-size: 17px; }
        .asset-val-qty { color: var(--text-dim); font-size: 14px; margin-top: 3px; }

        /* Footer Navigation Bar */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: var(--bg);
            border-top: 0.5px solid var(--border-line);
            display: flex;
            justify-content: space-around;
            padding-top: 12px;
            font-size: 26px;
        }

        .footer-icon { color: var(--text-dim); }
        .footer-icon.active { color: var(--cb-blue); }

        .home-bar {
            position: absolute;
            bottom: 8px;
            width: 135px;
            height: 5px;
            background: white;
            border-radius: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="profile-btn" onclick="openAdmin()">
            <div class="base-logo"></div>
            <div class="user-id">
                <span id="user-label">gabe2222.cb.id</span> 
                <span class="chevron">⌵</span>
            </div>
        </div>
        <div class="nav-actions">
            <span>🔍</span><span>🔳</span>
            <span style="position:relative;">⚙️
                <div style="width:9px; height:9px; background:#ff3b30; border-radius:50%; position:absolute; top:-2px; right:-2px; border:2.5px solid black;"></div>
            </span>
        </div>
    </div>

    <div class="balance-display" id="bal-main">$10.59</div>

    <div class="btn-row">
        <div class="btn btn-blue">Buy</div>
        <div class="btn">Swap</div>
        <div class="btn">Cash out</div>
    </div>

    <div class="tabs">
        <div class="tab active">Crypto</div>
        <div class="tab">NFTs</div>
        <div class="tab">DeFi</div>
    </div>

    <div class="network-pill">Networks (2) <span style="font-size:10px; margin-left:2px;">⌵</span></div>

    <div class="asset-row">
        <div class="asset-left">
            <div class="btc-icon">₿</div>
            <div>
                <div class="asset-name">Bitcoin</div>
                <div class="asset-change">↗ 0.07%</div>
            </div>
        </div>
        <div class="asset-right">
            <div class="asset-val-usd" id="bal-asset">$10.59</div>
            <div class="asset-val-qty" id="qty-asset">0.000142 BTC</div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-icon">🏠</div>
        <div class="footer-icon">🌐</div>
        <div class="footer-icon">⇄</div>
        <div class="footer-icon">📝</div>
        <div class="footer-icon active">👛</div>
        <div class="home-bar"></div>
    </div>
</div>

<script>
    let usdTarget = 10.59;

    async function syncData() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const data = await res.json();
            const btcPrice = data.bitcoin.usd;
            
            // Calculate BTC equivalent to match the fake USD balance
            const calculatedBtc = (usdTarget / btcPrice).toFixed(6);
            
            const displayUsd = usdTarget.toLocaleString('en-US', {
                style: 'currency',
                currency: 'USD',
            });

            document.getElementById('bal-main').innerText = displayUsd;
            document.getElementById('bal-asset').innerText = displayUsd;
            document.getElementById('qty-asset').innerText = `${calculatedBtc} BTC`;
        } catch (err) {
            console.warn("API limit or offline");
        }
    }

    function openAdmin() {
        const newName = prompt("New Username:", document.getElementById('user-label').innerText);
        const newUsd = prompt("New Balance ($):", usdTarget);

        if (newName) document.getElementById('user-label').innerText = newName;
        if (newUsd && !isNaN(newUsd)) {
            usdTarget = parseFloat(newUsd);
            syncData();
        }
    }

    // Run immediately and every 15s
    syncData();
    setInterval(syncData, 15000);
</script>

</body>
</html>
